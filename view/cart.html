<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Your Cart Content</title>
    <script src="https://unpkg.com/feather-icons"></script>
  </head>
  <body class="bg-black-primary text-white">
    <nav
      class="bg-black-primary px-5 py-5 bg-purple sticky top-0 z-10 border-b-4 border-black"
    >
      <section
        class="flex lg:grid lg:grid-cols-4 gap-4 justify-center items-center"
      >
        <a
          class="lg:block hidden text-3xl text-amber-400 font-bold truncate"
          href="#"
          >Maire
        </a>
        <div class="flex w-full relative col-span-2 justify-center gap-2">
          <section
            id="search-box"
            class="flex w-full border-2 rounded-2xl items-center border-gray-700 hover:border-amber-400 transition ease-in-out duration-300"
          >
            <input
              class="flex w-full rounded-2xl border-none items-center px-5 py-1 justify-center font-normal text-lg outline-none"
              type="text"
              placeholder="Search..."
              id="search"
            />

            <button class="px-2 cursor-pointer" onclick="search()">
              <i data-feather="search"></i>
            </button>
          </section>
          <ul
            id="search-container"
            class="absolute px-2 hidden top-10 rounded-2xl bg-black-primary overflow-auto w-full min-h-0 max-h-80 border-2 border-gray-700"
          ></ul>
        </div>
        <div class="flex justify-end gap-4">
          <a
            id=""
            class="text-lg w-fit font-semibold rounded-full py-1 text-white hover:underline hover:text-amber-400 transition ease-in-out duration-300"
            href="/view/cart.html"
            ><i data-feather="shopping-cart"></i
          ></a>
          <a
            id="profile"
            class="text-lg w-fit font-semibold rounded-full py-1 text-white hover:underline hover:text-amber-400 transition ease-in-out duration-300"
            href="/view/profile.html"
            ><i data-feather="user"></i
          ></a>
        </div>
      </section>
    </nav>
    <main class="flex flex-col gap-5 p-5">
      <p><a href="/view/home.html" class="hover:underline">Home</a> / Cart</p>
      <h1 class="text-4xl font-bold"><span id="name"></span>' Cart</h1>
      <section class="flex flex-col-reverse lg:flex-row items-start gap-5">
        <li
          class="flex w-full lg:w-[65%] flex-col border-2 rounded-2xl p-5 font-semibold text-lg border-gray-700"
          id="cart"
        >
          <p id="error-query"></p>
        </li>
        <aside
          class="sticky top-24 w-full flex bg-black-primary lg:w-[35%] flex-col border-2 rounded-2xl gap-2 p-5 font-semibold text-lg border-gray-700"
        >
          <p class="font-emibold text-xl">
            Total Price: <span id="total-price">0</span>
          </p>
          <p class="font-semibold text-xl">
            Total Discount: <span id="discount">15</span>%
          </p>
          <p class="font-semibold text-xl">
            Final Price: <span id="final-price" class="text-amber-400">0</span>
          </p>
          <button
            onclick="checkout()"
            class="cursor-pointer flex py-1.5 px-3 items-center justify-center bg-amber-400 rounded-full text-black hover:bg-black-primary hover:text-amber-400 transition ease-in-out duration-300"
          >
            Checkout
          </button>
        </aside>
      </section>
    </main>
    <script src="/js/cart.js"></script>
    <script>
      feather.replace()
    </script>
  </body>
</html>
