<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Maire</title>
    <script src="https://unpkg.com/feather-icons"></script>
  </head>
  <body class="bg-black-primary text-white">
    <nav
      class="bg-black-primary px-5 py-5 bg-purple sticky top-0 z-10 border-b-4 border-black"
    >
      <section
        class="flex lg:grid lg:grid-cols-4 gap-4 justify-center items-center"
      >
        <a
          class="lg:block hidden text-3xl text-amber-400 font-bold truncate"
          href="#"
          >Welcome, <span id="name"></span
        ></a>
        <div class="flex w-full relative col-span-2 justify-center gap-2">
          <section
            id="search-box"
            class="flex w-full border-2 rounded-2xl items-center border-gray-700 hover:border-amber-400 transition ease-in-out duration-300"
          >
            <input
              class="flex w-full rounded-2xl border-none items-center px-5 py-1 justify-center font-normal text-lg outline-none"
              type="text"
              placeholder="Search..."
              id="search"
            />

            <button class="px-2 cursor-pointer" onclick="search()">
              <i data-feather="search"></i>
            </button>
          </section>
          <ul
            id="search-container"
            class="absolute px-2 hidden top-10 rounded-2xl bg-black-primary overflow-auto w-full min-h-0 max-h-80 border-2 border-gray-700"
          ></ul>
        </div>
        <div class="flex justify-end gap-4">
          <a
            id=""
            class="text-lg w-fit font-semibold rounded-full py-1 text-white hover:underline hover:text-amber-400 transition ease-in-out duration-300"
            href="/view/cart.html"
            ><i data-feather="shopping-cart"></i
          ></a>
          <a
            id="profile"
            class="text-lg w-fit font-semibold rounded-full py-1 text-white hover:underline hover:text-amber-400 transition ease-in-out duration-300"
            href="/view/profile.html"
            ><i data-feather="user"></i
          ></a>
        </div>
      </section>
    </nav>
    <main>
      <div class="flex flex-col gap-2">
        <section class="flex flex-col px-5 gap-4 scroll-mt-20" id="category">
          <h4 class="lg:text-2xl font-bold">Shop by Category</h4>
          <li class="grid grid-cols-1 md:grid-cols-4 gap-3 lg:gap-10">
            <button
              onclick="showProduct('floor')"
              class="flex cursor-pointer items-center justify-center border-2 rounded-2xl p-2 lg:p-5 font-semibold text-sm lg:text-lg border-gray-700 hover:border-amber-400 hover:text-amber-400 transition ease-in-out duration-300"
            >
              Floor
            </button>

            <button
              onclick="showProduct('wall')"
              class="flex cursor-pointer items-center justify-center border-2 rounded-2xl p-2 lg:p-5 font-semibold text-sm lg:text-lg border-gray-700 hover:border-amber-400 hover:text-amber-400 transition ease-in-out duration-300"
            >
              Wall
            </button>

            <button
              onclick="showProduct('table')"
              class="flex cursor-pointer items-center justify-center border-2 rounded-2xl p-2 lg:p-5 font-semibold text-sm lg:text-lg border-gray-700 hover:border-amber-400 hover:text-amber-400 transition ease-in-out duration-300"
            >
              On Table
            </button>

            <button
              onclick="showProduct('any')"
              class="flex cursor-pointer items-center justify-center border-2 rounded-2xl p-2 lg:p-5 font-semibold text-sm lg:text-lg border-gray-700 hover:border-amber-400 hover:text-amber-400 transition ease-in-out duration-300"
            >
              Anything
            </button>
          </li>
        </section>
        <section class="flex flex-col gap-8 p-5">
          <h4 class="text-2xl font-bold">Best Picks</h4>
          <p id="error-query"></p>
          <ul
            class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10"
            id="product-container"
          ></ul>
        </section>
      </div>
    </main>
    <footer
      class="flex flex-col gap-2 items-center justify-center border-t-2 p-5 border-gray-700 bg-black-primary"
    >
      <p class="font-bold">Get to know about us!</p>
      <nav class="flex gap-2">
        <a
          href="https://www.instagram.com/_tatahdani/"
          target="_blank"
          class="flex border-2 hover:border-amber-400 hover:text-amber-400 border-gray-700 p-2 rounded-full transition duration-300 ease-in-out"
          ><i data-feather="at-sign"></i
        ></a>
        <a
          href=""
          class="flex border-2 hover:border-amber-400 hover:text-amber-400 border-gray-700 p-2 rounded-full transition duration-300 ease-in-out"
          ><i data-feather="mail"></i
        ></a>
        <a
          href="#"
          class="flex border-2 hover:border-amber-400 hover:text-amber-400 border-gray-700 p-2 rounded-full transition duration-300 ease-in-out"
          ><i data-feather="phone"></i
        ></a>
        <a
          href="https://github.com/TreasureMAP7"
          target="_blank"
          class="flex border-2 hover:border-amber-400 hover:text-amber-400 border-gray-700 p-2 rounded-full transition duration-300 ease-in-out"
          ><i data-feather="github"></i
        ></a>
      </nav>
      <p class="text-sm mt-5">Maire &copy; 2026</p>
    </footer>
    <script src="/js/home.js"></script>
  </body>
</html>
