<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/style.css" />
    <script src="https://unpkg.com/feather-icons"></script>
    <title>Maire</title>
  </head>
  <body class="bg-black-primary text-white">
    <nav
      class="bg-black-primary px-5 md:px-10 lg:px-20 py-5 bg-purple sticky top-0 z-10 border-b-4 border-black"
    >
      <section class="grid grid-cols-2 md:grid-cols-3 justify-center items-center">
        <a class="text-3xl text-amber-400 font-bold" href="#">Maire</a>
        <div class="hidden md:flex justify-center gap-1">
          <a
            class="text-lg font-semibold rounded-full px-4 py-1 text-white hover:underline hover:text-amber-400 transition ease-in-out duration-300"
            href="#"
            >Home
          </a>
          <a
            class="text-lg font-semibold rounded-full px-4 py-1 text-white hover:underline hover:text-amber-400 transition ease-in-out duration-300"
            href="#category"
            >Category
          </a>
          <a
            class="text-lg font-semibold rounded-full px-4 py-1 text-white hover:underline hover:text-amber-400 transition ease-in-out duration-300"
            href="#products"
            >Products
          </a>
        </div>
        <div class="flex justify-end gap-4 lg:gap-8">
          <a
            id="login"
            class="text-lg w-fit font-semibold rounded-full py-1 text-white hover:underline hover:text-amber-400 transition ease-in-out duration-300"
            href="/view/login.html"
            >Login</a
          >
          <a
            id="register"
            class="text-lg w-fit font-semibold rounded-full py-1 text-white hover:underline hover:text-amber-400 transition ease-in-out duration-300"
            href="/view/register.html"
            >Register</a
          >
        </div>
      </section>
    </nav>
    <main class="flex flex-col gap-4">
      <div class="relative h-50 lg:h-screen border-b-4 border-gray-400">
        <!-- jumbotron -->
        <section
          class="absolute inset-0 bg-[url(/img/jumbotron.jpg)] bg-cover bg-center"
        ></section>
        <section
          class="absolute inset-0 flex flex-col gap-4 justify-center h-50 lg:h-screen items-center bg-black/60 bg-cover bg-center"
        >
          <h1 class="text-2xl md:text-4xl lg:text-7xl font-bold text-purple text-center">
            Welcome To <span class="text-amber-400">Maire</span>
          </h1>
          <h2 class="md:text-xl lg:text-2xl font-thin text-purple">
            Where Ideas fill your Space
          </h2>
          <a
            class="lg:text-xl font-bold mt-2 lg:mt-15 bg-amber-400 rounded-full flex px-2 py-1 lg:px-4 lg:py-2 items-center justify-center text-black-primary hover:bg-black-primary hover:text-amber-400 transition ease-in-out duration-300"
            href="/view/register.html"
            >Shop Now</a
          >
        </section>
      </div>
      <div class="flex flex-col px-5 md:px-10 lg:px-20 gap-5">
        <section class="flex flex-col gap-4 scroll-mt-20" id="category">
          <h4 class=" lg:text-2xl font-bold">Shop by Category</h4>
          <li class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-3 md:gap-10 lg:gap-4">
            <a
              href="/view/register.html"
              class="flex items-center justify-center border-2 rounded-2xl p-2 lg:p-5 font-semibold text-sm lg:text-lg border-gray-700 hover:border-amber-400 hover:text-amber-400 transition ease-in-out duration-300"
              >Bedroom</a
            >

            <a
              href="/view/register.html"
              class="hidden lg:flex items-center justify-center border-2 rounded-2xl p-2 lg:p-5 font-semibold text-sm lg:text-lg border-gray-700 hover:border-amber-400 hover:text-amber-400 transition ease-in-out duration-300"
              >Electronic</a
            >

            <a
              href="/view/register.html"
              class="flex items-center justify-center border-2 rounded-2xl p-2 lg:p-5 font-semibold text-sm lg:text-lg border-gray-700 hover:border-amber-400 hover:text-amber-400 transition ease-in-out duration-300"
              >Decoration</a
            >

            <a
              href="/view/register.html"
              class="hidden lg:flex items-center justify-center border-2 rounded-2xl p-2 lg:p-5 font-semibold text-sm lg:text-lg border-gray-700 hover:border-amber-400 hover:text-amber-400 transition ease-in-out duration-300"
              >Kitchen</a
            >

            <a
              href="/view/register.html"
              class="flex items-center justify-center border-2 rounded-2xl p-2 lg:p-5 font-semibold text-sm lg:text-lg border-gray-700 hover:border-amber-400 hover:text-amber-400 transition ease-in-out duration-300"
              >And More...</a
            >
          </li>
        </section>
        <section class="flex flex-col gap-8 scroll-mt-20" id="products">
          <h4 class=" lg:text-2xl font-bold">Best Picks</h4>
          <li class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-12 md:gap-10" id="product-container"></li>
        </section>
      </div>
    </main>
    <script src="/js/landing.js"></script>
  </body>
</html>
